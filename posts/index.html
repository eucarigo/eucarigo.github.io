<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog · eucarigo</title>
    <link rel="icon" type="image/png" sizes="2048x2048" href="../i/favicon-2048x2048.png">
    <style>
        body {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
            font: 18px/1.6 Georgia, serif;
            color: #333;
            background: #fff;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 0.2em;
            line-height: 1.2;
        }
        
        h2 {
            font-size: 1.5em;
            margin-top: 2em;
            margin-bottom: 0.5em;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.3em;
        }
        
        h3 {
            font-size: 1.2em;
            margin-top: 1.5em;
            margin-bottom: 0.3em;
        }
        
        a {
            color: #0066cc;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .project {
            margin-bottom: 2em;
        }
        
        .meta {
            color: #666;
            font-size: 0.9em;
            font-style: italic;
        }
        
        .download {
            display: inline-block;
            padding: .25em .6em;
            border: 2px solid #333;
            background: #333;
            font-family: monospace;
            font-size: .9em;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            margin-right: 12px;
            border-radius: 8px;
        }

        .download:hover {
            background: #333;
            color: #fff;
        }
        
        .brand{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .links{
            display:flex;
            flex-wrap:wrap;
            gap:18px;
            margin-top:1rem;
            font-family: monospace;
            font-size:.95rem;
        }

        .links a{
            display:inline-flex;
            align-items:center;
            gap:6px;
            text-decoration:none;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .back-link {
            margin-bottom: 2em;
            font-family: monospace;
            font-size: 0.9em;
        }

        footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #666;
        }
        
        ul {
            margin: 0.5em 0;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #e0e0e0;
            }
            
            h2 {
                border-bottom-color: #444;
            }
            
            a {
                color: #4d9fff;
            }
            
            code {
                background: #2a2a2a;
            }
            
            .download {
                background: #2a2a2a;
                border-color: #444;
            }
            
            .download:hover {
                background: #333;
            }
            
            footer {
                border-top-color: #444;
            }
            
            .meta {
                color: #999;
            }
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="../index.html">← página principal</a>
    </div>
    
    <header>
        <h1 class="brand">
            <img src="../i/favicon-2048x2048.png" alt="Logo" width="48" height="48">
            Blog
        </h1>

        <p class="meta">artículos propios</p>
    </header>

    <footer>
        <p>
            Esta página no usa cookies, ni analytics. Es únicamente impulsada 
            por GitHub Pages con HTML, haciendo que la página esté perfectamente 
            equilibrada, como debería estar todo.
        </p>
        <p>© 2026 eucarigo. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
