<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin · eucarigo</title>
    <link rel="icon" type="image/png" sizes="2048x2048" href="i/favicon-2048x2048.png">
    <style>
        body {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
            font: 18px/1.6 Georgia, serif;
            color: #333;
            background: #fff;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 0.2em;
            line-height: 1.2;
        }
        
        h2 {
            font-size: 1.5em;
            margin-top: 2em;
            margin-bottom: 0.5em;
            border-bottom: 1px solid #ddd;
            padding-bottom: 0.3em;
        }
        
        a {
            color: #0066cc;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .meta {
            color: #666;
            font-size: 0.9em;
            font-style: italic;
        }
        
        label {
            font-weight: bold;
            display: block;
            margin-top: 1.2em;
            margin-bottom: 0.3em;
        }
        
        input, textarea {
            font-family: inherit;
            font-size: 1rem;
            padding: 0.5rem;
            border: 1px solid #ddd;
            background: #fff;
            width: 100%;
            box-sizing: border-box;
        }
        
        input:focus, textarea:focus {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
        
        textarea {
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        
        #postSummary {
            font-family: Georgia, serif;
            height: 80px;
        }
        
        .preview {
            border: 1px solid #ddd;
            background: #fafafa;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow: auto;
        }
        
        button {
            display: inline-block;
            padding: 0.5em 1.2em;
            border: 2px solid #333;
            background: #333;
            font-family: monospace;
            font-size: 0.9em;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            margin-top: 1rem;
            margin-right: 0.5rem;
            cursor: pointer;
        }
        
        button:hover {
            background: #000;
            border-color: #000;
        }
        
        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f4f4f4;
            font-family: monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
        }
        
        .error {
            background: #ffe0e0;
            color: #c00;
            border-left: 4px solid #c00;
        }
        
        .success {
            background: #e0ffe0;
            color: #060;
            border-left: 4px solid #060;
        }
        
        .token-section {
            background: #fafafa;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #ddd;
        }
        
        .token-flex {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        
        .token-flex input {
            flex: 1;
            min-width: 200px;
        }
        
        .token-flex button {
            margin-top: 0;
        }
        
        hr {
            margin: 2.5rem 0;
            border: none;
            border-top: 1px solid #ddd;
        }
        
        footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #666;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
                color: #e0e0e0;
            }
            
            h2 {
                border-bottom-color: #444;
            }
            
            a {
                color: #4d9fff;
            }
            
            code {
                background: #2a2a2a;
            }
            
            input, textarea {
                background: #2a2a2a;
                border-color: #444;
                color: #e0e0e0;
            }
            
            .preview {
                background: #2a2a2a;
                border-color: #444;
            }
            
            .status {
                background: #2a2a2a;
            }
            
            .error {
                background: #3a1a1a;
                color: #ffa0a0;
            }
            
            .success {
                background: #1a3a1a;
                color: #a0ffa0;
            }
            
            .token-section {
                background: #2a2a2a;
                border-color: #444;
            }
            
            button {
                background: #2a2a2a;
                border-color: #444;
            }
            
            button:hover {
                background: #333;
            }
            
            footer {
                border-top-color: #444;
            }
            
            .meta {
                color: #999;
            }
            
            hr {
                border-top-color: #444;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>administración</h1>
        <p class="meta">eucarigo</p>
    </header>

    <main>
        <div class="token-section">
            <div class="token-flex">
                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
                <button id="saveTokenBtn">guardar</button>
            </div>
        </div>

        <hr>

        <div id="editorArea" style="display: none;">
            <h2>Nuevo artículo</h2>
            
            <label>Título del artículo</label>
            <input type="text" id="postTitle" placeholder="Ej: Adiós a las dependencias innecesarias">

            <label>Slug (URL amigable) — déjalo vacío para autogenerar</label>
            <input type="text" id="postSlug" placeholder="ej: adios-dependencias">

            <label>Resumen (máx. 400 caracteres) *</label>
            <textarea id="postSummary" maxlength="400" placeholder="Breve descripción que aparecerá en la portada..."></textarea>

            <label>Contenido (Markdown)</label>
            <textarea id="postContent" placeholder="Escribe aquí en Markdown..."></textarea>

            <button id="previewBtn">👁️ Previsualizar</button>
            <div id="previewArea" class="preview" style="display:none;"></div>

            <button id="publishBtn">🚀 Publicar artículo</button>
            <div id="publishStatus" class="status" style="display:none;"></div>
        </div>
    </main>

    <footer>
        <p>
            Esta página no usa cookies, ni analytics. Es únicamente impulsada 
            por GitHub Pages con HTML, haciendo que la página esté perfectamente 
            equilibrada, como debería estar todo.
        </p>
        <p>© 2026 eucarigo. Todos los derechos reservados.</p>
    </footer>

    <script>
        // ---------- Configuración ----------
        const REPO_OWNER = 'eucarigo';
        const REPO_NAME = 'eucarigo.github.io';
        const BRANCH = 'main';

        let githubToken = localStorage.getItem('github_token');

        // Elementos DOM
        const tokenInput = document.getElementById('githubToken');
        const saveTokenBtn = document.getElementById('saveTokenBtn');
        const editorArea = document.getElementById('editorArea');
        const publishBtn = document.getElementById('publishBtn');
        const previewBtn = document.getElementById('previewBtn');
        const previewArea = document.getElementById('previewArea');
        const statusDiv = document.getElementById('publishStatus');

        // ---------- Funciones auxiliares ----------
        function setToken(token) {
            githubToken = token;
            if (token) {
                localStorage.setItem('github_token', token);
                editorArea.style.display = 'block';
                document.querySelector('.token-section').style.opacity = '0.7';
            } else {
                localStorage.removeItem('github_token');
                editorArea.style.display = 'none';
                document.querySelector('.token-section').style.opacity = '1';
            }
        }

        // Base64 UTF-8 correcto
        function utf8ToBase64(str) {
            const bytes = new TextEncoder().encode(str);
            const binString = Array.from(bytes, (byte) => String.fromCodePoint(byte)).join('');
            return btoa(binString);
        }

        async function getFileSha(path) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
            const res = await fetch(url, {
                headers: { 'Authorization': `token ${githubToken}` }
            });
            if (res.status === 404) return null;
            if (!res.ok) throw new Error(`Error al obtener ${path}: ${res.status}`);
            const data = await res.json();
            return data.sha;
        }

        async function uploadFile(path, content, commitMessage) {
            const sha = await getFileSha(path);
            const payload = {
                message: commitMessage,
                content: utf8ToBase64(content),
                branch: BRANCH
            };
            if (sha) payload.sha = sha;

            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
            const res = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'Error al subir archivo');
            }
            return await res.json();
        }

        async function getPostsJson() {
            const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/posts.json`;
            try {
                const res = await fetch(url);
                if (res.status === 404) return [];
                if (!res.ok) throw new Error('No se pudo leer posts.json');
                return await res.json();
            } catch(e) {
                return [];
            }
        }

        function slugify(title) {
            return title
                .toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatDateStatic(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function buildArticleHtml(title, date, markdownContent) {
            const htmlContent = marked.parse(markdownContent);
            const year = new Date().getFullYear(); // dinámico
            return `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${escapeHtml(title)} · eucarigo</title>
    <link rel="icon" type="image/png" sizes="2048x2048" href="../i/favicon-2048x2048.png">
    <style>
        body {
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
            font: 18px/1.6 Georgia, serif;
            color: #333;
            background: #fff;
        }
        h1, h2, h3 { line-height: 1.2; }
        h1 { font-size: 2em; border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
        h2 { border-bottom: 1px solid #eee; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background: #f4f4f4; padding: 2px 6px; font-family: monospace; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
        footer {
            margin-top: 4em;
            padding-top: 2em;
            border-top: 1px solid #ddd;
            font-size: 0.9em;
            color: #666;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #e0e0e0; }
            h1, h2 { border-bottom-color: #444; }
            a { color: #4d9fff; }
            code { background: #2a2a2a; }
            footer { border-top-color: #444; }
            .meta { color: #999; }
        }
        .back-link {
            margin-bottom: 2em;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="back-link">
        <a href="../">← página principal</a>
    </div>
    <header>
        <h1>${escapeHtml(title)}</h1>
        <div class="meta">${formatDateStatic(date)}</div>
    </header>
    <main>${htmlContent}</main>
    <footer>
        <p>
            Esta página no usa cookies, ni analytics. Es únicamente impulsada 
            por GitHub Pages con HTML, haciendo que la página esté perfectamente 
            equilibrada, como debería estar todo.
        </p>
        <p>© ${year} eucarigo. Todos los derechos reservados.</p>
    </footer>
</body>
</html>`;
        }

        // ---------- Eventos ----------
        if (githubToken) {
            tokenInput.value = githubToken;
            setToken(githubToken);
        } else {
            editorArea.style.display = 'none';
        }

        saveTokenBtn.addEventListener('click', () => {
            const newToken = tokenInput.value.trim();
            if (!newToken) return;
            setToken(newToken);
            statusDiv.innerHTML = '<span class="success">✅ Token guardado (solo en este navegador).</span>';
            statusDiv.style.display = 'block';
            setTimeout(() => {
                statusDiv.innerHTML = '';
                statusDiv.style.display = 'none';
            }, 3000);
        });

        publishBtn.addEventListener('click', async () => {
            statusDiv.innerHTML = '⏳ Publicando...';
            statusDiv.className = 'status';
            statusDiv.style.display = 'block';

            const title = document.getElementById('postTitle').value.trim();
            let slug = document.getElementById('postSlug').value.trim();
            const summary = document.getElementById('postSummary').value.trim();
            const markdown = document.getElementById('postContent').value;

            if (!title || !markdown) {
                statusDiv.innerHTML = '<span class="error">❌ Título y contenido son obligatorios.</span>';
                statusDiv.className = 'status error';
                return;
            }
            if (!summary) {
                statusDiv.innerHTML = '<span class="error">❌ El resumen es obligatorio (máx. 400 caracteres).</span>';
                statusDiv.className = 'status error';
                return;
            }
            if (summary.length > 400) {
                statusDiv.innerHTML = '<span class="error">❌ El resumen no puede exceder los 400 caracteres.</span>';
                statusDiv.className = 'status error';
                return;
            }
            if (!githubToken) {
                statusDiv.innerHTML = '<span class="error">❌ Configura tu token de GitHub primero.</span>';
                statusDiv.className = 'status error';
                return;
            }

            if (!slug) slug = slugify(title);
            if (!slug) slug = 'post-' + Date.now();

            const today = new Date().toISOString().split('T')[0];
            const articleHtml = buildArticleHtml(title, today, markdown);

            try {
                await uploadFile(`posts/${slug}.html`, articleHtml, `Blog: nuevo artículo "${title}"`);
                let posts = await getPostsJson();
                const existingIndex = posts.findIndex(p => p.slug === slug);
                const newPost = { slug, title, date: today, summary };
                if (existingIndex >= 0) posts[existingIndex] = newPost;
                else posts.push(newPost);
                posts.sort((a,b) => new Date(b.date) - new Date(a.date));
                await uploadFile('posts.json', JSON.stringify(posts, null, 2), `Actualizar índice del blog: "${title}"`);

                statusDiv.innerHTML = `✅ Artículo publicado correctamente.\n🔗 Ver: https://eucarigo.com/posts/${slug}.html\n📄 El blog principal ya muestra la nueva entrada.`;
                statusDiv.className = 'status success';

                previewArea.style.display = 'none';
                document.getElementById('postTitle').value = '';
                document.getElementById('postSlug').value = '';
                document.getElementById('postSummary').value = '';
                document.getElementById('postContent').value = '';
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = `❌ Error: ${err.message}`;
                statusDiv.className = 'status error';
            }
        });

        previewBtn.addEventListener('click', () => {
            const md = document.getElementById('postContent').value;
            previewArea.innerHTML = md ? marked.parse(md) : '<em>Escribe algo para previsualizar.</em>';
            previewArea.style.display = 'block';
        });
    </script>
</body>
</html>
